<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A股短线助手看板</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #18202a;
      --muted: #657386;
      --line: #dfe5ec;
      --red: #c93434;
      --blue: #2568a8;
      --teal: #0f766e;
      --green: #16834f;
      --amber: #aa6509;
      --purple: #7357a6;
      --shadow: 0 8px 24px rgba(20, 32, 46, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }
    button, input { font: inherit; }
    .shell { min-height: 100vh; }
    .topbar {
      background: #101820;
      color: #fff;
      border-bottom: 4px solid #c93434;
    }
    .topbar-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 22px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
    }
    .subtitle {
      margin-top: 6px;
      color: #c7d0dc;
      font-size: 14px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }
    .refresh-button {
      height: 40px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      padding: 0 14px;
      color: #fff;
      background: #c93434;
      cursor: pointer;
      font-weight: 700;
    }
    .refresh-button:disabled {
      opacity: .7;
      cursor: wait;
    }
    .refresh-state {
      min-width: 112px;
      color: #c7d0dc;
      font-size: 13px;
      text-align: right;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #48c989;
    }
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px 22px 44px;
    }
    .notice {
      display: none;
    }
    .refresh-summary {
      display: none;
      background: #eef8f5;
      border: 1px solid #b9d8d1;
      color: #174a43;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .refresh-summary.show { display: block; }
    .freshness-banner {
      display: none;
      background: #eef4fb;
      border: 1px solid #bdd0e8;
      color: #183f68;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .freshness-banner.show { display: block; }
    .freshness-banner.warn {
      background: #fff8ec;
      border-color: #e5c486;
      color: #6a4306;
    }
    .funnel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .funnel-step {
      position: relative;
      min-height: 64px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .funnel-step::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 5px;
      height: 100%;
      background: var(--blue);
    }
    .funnel-step:nth-child(2)::after { background: var(--teal); }
    .funnel-step:nth-child(3)::after { background: var(--purple); }
    .funnel-step:nth-child(4)::after { background: var(--red); }
    .funnel-step span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .funnel-step strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
      line-height: 1.1;
    }
    .funnel-step small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .metric {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      min-height: 58px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .metric.clickable {
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .metric.clickable:hover {
      transform: translateY(-1px);
      border-color: #b8c7d8;
      box-shadow: 0 10px 26px rgba(20, 32, 46, 0.12);
    }
    .metric.active-filter {
      border-color: #101820;
      box-shadow: inset 0 0 0 2px #101820, var(--shadow);
    }
    .metric span {
      color: var(--muted);
      display: block;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
    }
    .metric strong {
      margin-top: 3px;
      display: block;
      font-size: clamp(18px, 1.25vw, 24px);
      line-height: 1.12;
      overflow-wrap: anywhere;
      word-break: break-word;
      letter-spacing: 0;
    }
    .metric.long strong {
      font-size: clamp(15px, 1vw, 20px);
      line-height: 1.16;
    }
    .metric.small strong {
      font-size: clamp(13px, .9vw, 17px);
      line-height: 1.18;
    }
    .metric.a strong { color: var(--red); }
    .metric.b strong { color: var(--blue); }
    .metric.c strong { color: var(--teal); }
    .note-corner {
      position: absolute;
      top: 0;
      right: 0;
      width: 24px;
      height: 24px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }
    .note-corner::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-top: 18px solid var(--red);
      border-left: 18px solid transparent;
      border-top-right-radius: 7px;
    }
    .note-popup {
      display: none;
      position: absolute;
      z-index: 5;
      top: 28px;
      right: 8px;
      width: min(260px, 75vw);
      padding: 10px;
      border: 1px solid #efc8c8;
      border-radius: 8px;
      background: #fff8f8;
      color: #6f1d1d;
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.45;
    }
    .metric.show-note .note-popup {
      display: block;
    }
    .paper-hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 14px;
    }
    .paper-hero-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .paper-hero-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .paper-hero-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
    .paper-hero .paper-panel {
      margin-top: 0;
    }
    .paper-hero .paper-metrics {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
    .paper-hero .paper-position, .paper-hero .paper-trade {
      display: inline-block;
      width: calc(50% - 4px);
      margin-right: 4px;
      vertical-align: top;
    }
    .layout {
      display: block;
    }
    .board {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .board h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .board-tools {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(320px, 1.2fr);
      gap: 12px;
      padding: 14px 14px 0;
      align-items: start;
    }
    .tool-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 10px;
      min-width: 0;
    }
    .tool-panel .label {
      margin-bottom: 7px;
    }
    .control-group {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }
    .segmented button {
      border: 1px solid var(--line);
      background: #f7f8fa;
      border-radius: 8px;
      padding: 8px 0;
      cursor: pointer;
    }
    .segmented button.active {
      background: #101820;
      color: #fff;
      border-color: #101820;
    }
    .search {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
    }
    .theme-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .theme-chip {
      border: 1px solid #cad5e3;
      background: #f6f9fc;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
    }
    .theme-chip.active {
      background: #e8f1fb;
      border-color: var(--blue);
      color: #174b80;
    }
    .board-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 14px 0;
    }
    .board-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .candidate {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .candidate-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .pool {
      width: 88px;
      height: 40px;
      border-radius: 8px;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      background: var(--red);
    }
    .pool.B { background: var(--blue); }
    .pool.C { background: var(--teal); }
    .name {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
    }
    .code {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }
    .change {
      font-size: 22px;
      font-weight: 800;
      color: var(--red);
      white-space: nowrap;
    }
    .candidate-body {
      padding: 12px;
    }
    .scoreline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .score-pill {
      border: 1px solid var(--line);
      background: #fbfbfc;
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .point-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 10px;
    }
    .point {
      border: 1px solid #f0c9c9;
      background: #fff8f8;
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 0;
    }
    .point span {
      display: block;
      color: #8f2a2a;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }
    .point strong {
      display: block;
      margin-top: 3px;
      color: var(--red);
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .point.stop {
      border-color: #d8dde5;
      background: #f8fafc;
    }
    .point.stop span {
      color: var(--muted);
    }
    .point.stop strong {
      color: var(--ink);
    }
    .point.follow {
      border-color: #cfe2de;
      background: #f2fbf8;
    }
    .point.follow span {
      color: var(--teal);
    }
    .point.follow strong {
      color: var(--teal);
      font-size: 13px;
      line-height: 1.25;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tag {
      border: 1px solid #cdd8e5;
      background: #f3f7fb;
      color: #244762;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
    }
    .tag.strategy {
      background: #fff1f1;
      color: #9e2525;
      border-color: #efc8c8;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .stat {
      padding: 8px;
      border-right: 1px solid var(--line);
      background: #fafbfc;
    }
    .stat:last-child { border-right: 0; }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 15px;
    }
    .reason, .risk, .score-detail, .plan {
      border-left: 4px solid var(--blue);
      background: #f7fbff;
      border-radius: 6px;
      padding: 9px 10px;
      margin-top: 8px;
    }
    .workflow {
      border-left: 4px solid var(--teal);
      background: #f2fbf8;
      border-radius: 6px;
      padding: 9px 10px;
      margin-top: 8px;
    }
    .workflow-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 6px;
    }
    .workflow-grid div {
      border: 1px solid #cfe2de;
      border-radius: 8px;
      background: #fbfffd;
      padding: 7px;
      font-size: 12px;
      min-width: 0;
    }
    .workflow-grid strong {
      display: block;
      color: var(--ink);
      font-size: 12px;
      margin-bottom: 2px;
    }
    .workflow-grid p {
      margin: 0;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .risk.ok {
      border-left-color: var(--green);
      background: #f2fbf6;
    }
    .risk.warn {
      border-left-color: var(--amber);
      background: #fff8ec;
    }
    .score-detail {
      border-left-color: var(--purple);
      background: #f7f4fb;
    }
    .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .plan-grid div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fbfbfc;
      font-size: 13px;
    }
    .themes-panel {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }
    .theme-row {
      display: grid;
      grid-template-columns: 70px 1fr 24px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }
    .config-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
    }
    .workflow-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .review-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .review-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 8px;
      font-size: 12px;
    }
    .review-row strong {
      display: block;
      font-size: 13px;
      color: var(--ink);
    }
    .review-row span {
      color: var(--muted);
    }
    .review-row em {
      display: block;
      margin-top: 3px;
      color: var(--teal);
      font-style: normal;
      font-weight: 700;
      line-height: 1.35;
    }
    .review-row.weak em {
      color: var(--amber);
    }
    .paper-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
    }
    .paper-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .paper-metric, .paper-position, .paper-trade {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 8px;
      min-width: 0;
    }
    .paper-metric span, .paper-position span, .paper-trade span {
      display: block;
      color: var(--muted);
      line-height: 1.3;
    }
    .paper-metric strong {
      display: block;
      margin-top: 2px;
      font-size: 15px;
      color: var(--ink);
      overflow-wrap: anywhere;
    }
    .paper-metric.profit strong {
      color: var(--red);
    }
    .paper-metric.loss strong {
      color: var(--green);
    }
    .paper-position strong, .paper-trade strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.25;
    }
    .paper-position em, .paper-trade em {
      display: block;
      margin-top: 3px;
      color: var(--teal);
      font-style: normal;
      font-weight: 700;
    }
    .paper-position.weak em, .paper-trade.weak em {
      color: var(--green);
    }
    .paper-note {
      color: var(--muted);
      line-height: 1.4;
    }
    .workflow-step {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 8px;
    }
    .workflow-step strong {
      display: block;
      font-size: 13px;
      margin-bottom: 3px;
    }
    .workflow-step span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .config-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 8px;
    }
    .config-line span {
      color: var(--muted);
    }
    .config-line strong {
      text-align: right;
    }
    .config-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .config-warning {
      border-left: 4px solid var(--amber);
      background: #fff8ec;
      border-radius: 6px;
      padding: 8px;
      color: #714503;
      font-size: 12px;
    }
    .bar {
      height: 8px;
      background: #edf1f5;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      background: var(--purple);
    }
    .excluded {
      padding: 0 14px 14px;
    }
    .excluded details {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      color: var(--muted);
    }
    .excluded li {
      margin: 5px 0;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 980px) {
      .topbar-inner { grid-template-columns: 1fr; align-items: start; }
      .funnel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .point-grid { grid-template-columns: 1fr; }
      .workflow-grid { grid-template-columns: 1fr; }
      .board-tools { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr; }
      .paper-hero .paper-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .paper-hero .paper-position, .paper-hero .paper-trade { display: block; width: auto; margin-right: 0; }
    }
    @media (max-width: 620px) {
      main { padding: 14px 12px 34px; }
      .topbar-inner { padding: 18px 12px; }
      h1 { font-size: 24px; }
      .funnel { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats, .plan-grid { grid-template-columns: 1fr; }
      .stat { border-right: 0; border-bottom: 1px solid var(--line); }
      .stat:last-child { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>A股短线助手看板</h1>
          <div class="subtitle" id="subtitle"></div>
        </div>
        <div class="top-actions">
          <div class="status-pill"><span class="status-dot"></span><span id="marketState"></span></div>
          <button class="refresh-button" id="refreshData" type="button">刷新数据</button>
          <div class="refresh-state" id="refreshState"></div>
        </div>
      </div>

  <script>
    const data = JSON.parse(document.getElementById('dashboard-data').textContent);
    const state = { pool: 'ALL', theme: 'ALL', query: '' };

    const poolLabel = { A: '重点关注', B: '观察候补', C: '题材异动记录' };
    const poolNotes = {
      A: '重点关注：命中攻击型尾盘突破或主线热点回流等较强信号，并且严重风险较少，是次日优先观察对象。',
      B: '观察候补：主题或形态有机会，但强度、确认度、风险控制不如重点关注，需要等待次日确认。',
      C: '题材异动记录：命中重点主题，但暂时没有明确策略信号或强度不足，主要用于记录和后续观察。'
    };
    const metricItems = [
      { label: '交易日', value: data.trade_date || '-' },
      { label: '重点关注', value: data.summary.a_pool, tone: 'a', pool: 'A' },
      { label: '观察候补', value: data.summary.b_pool, tone: 'b', pool: 'B' },
      { label: '题材异动记录', value: data.summary.c_pool, tone: 'c', pool: 'C' },
      { label: '股票池缓存', value: data.summary.universe_cache },
      { label: '覆盖状态', value: data.summary.coverage_status },
      { label: '已剔除', value: data.summary.excluded }
    ];

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function splitTags(value) {
      return String(value || '').replace(/；/g, ';').split(';').map(x => x.trim()).filter(Boolean);
    }

    function numberValue(value) {
      const n = Number(String(value ?? '').replace(/,/g, ''));
      return Number.isFinite(n) ? n : 0;
    }

    function money(value) {
      return numberValue(value).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function pct(value) {
      return `${numberValue(value).toFixed(2)}%`;
    }

    function renderMetrics() {
      const sourceDetail = (data.source_counts || []).map(([name, count]) => `${name} ${count}`).join('，');
      document.getElementById('subtitle').textContent = `生成时间：${data.generated_at} · 来源：${sourceDetail || data.primary_source || '-'}`;
      document.getElementById('marketState').textContent = `市场状态：${data.market_state}`;
      document.getElementById('metrics').innerHTML = metricItems.map(item => `
        <div class="metric ${item.tone || ''} ${item.pool ? 'clickable' : ''} ${item.pool && state.pool === item.pool ? 'active-filter' : ''} ${String(item.value ?? '').length >= 6 ? 'long' : ''} ${String(item.value ?? '').length >= 10 ? 'small' : ''}" ${item.pool ? `data-metric-pool="${item.pool}" role="button" tabindex="0" aria-label="查看${escapeHtml(item.label)}列表"` : ''}>
          ${item.pool ? `<button class="note-corner" type="button" data-note-pool="${item.pool}" aria-label="${escapeHtml(item.label)}说明"></button><div class="note-popup">${escapeHtml(poolNotes[item.pool])}</div>` : ''}
          <span>${escapeHtml(item.label)}</span>
          <strong>${escapeHtml(item.value)}</strong>
        </div>
      `).join('');
    }

    function percent(part, total) {
      const base = Number(total || 0);
      if (!base) return '-';
      return `${(Number(part || 0) / base * 100).toFixed(1)}%`;
    }

    function renderFunnel() {
      const total = data.summary.total_rows || 0;
      const eligible = data.summary.eligible || 0;
      const rawHits = data.summary.raw_candidate_count || 0;
      const finalCount = data.summary.candidate_count || 0;
      const steps = [
        { label: '原始采集', value: total, note: `行情接口拿到` },
        { label: '有效主板', value: eligible, note: `剔除 ST、创业板等` },
        { label: '规则命中', value: rawHits, note: `主题/形态/量价命中` },
        { label: '最终展示', value: finalCount, note: `收敛到三类池` }
      ];
      document.getElementById('screeningFunnel').innerHTML = steps.map((step, index) => {
        const denominator = index === 0 ? total : steps[index - 1].value;
        return `
          <div class="funnel-step">
            <span>${escapeHtml(step.label)}</span>
            <strong>${escapeHtml(step.value)}</strong>
            <small>${escapeHtml(step.note)} · 保留 ${escapeHtml(index === 0 ? '100%' : percent(step.value, denominator))}</small>
          </div>
        `;
      }).join('');
    }

    function renderRefreshSummary() {
      const raw = localStorage.getItem('lastRefreshSummary');
      if (!raw) return;
      localStorage.removeItem('lastRefreshSummary');
      try {
        const summary = JSON.parse(raw);
        const parts = [
          `来源：${summary.source || '-'}`,
          `交易日：${summary.trade_date || '-'}`,
          `采集：${summary.rows || 0}`,
          `规则命中：${summary.raw_candidate_count || 0}`,
          `入池：${summary.candidate_rows || 0}`,
          `股票池：${summary.universe_cache || 0}`,
          `复盘：${summary.review_rows || 0}`
        ];
        if (summary.fallback) parts.push('已启用降级兜底');
        const box = document.getElementById('refreshSummary');
        box.textContent = `刷新完成 · ${parts.join(' · ')}`;
        box.classList.add('show');
      } catch (error) {
        localStorage.removeItem('lastRefreshSummary');
      }
    }

    function renderCoverageNotice() {
      if (data.summary.coverage_status !== '覆盖偏窄') return;
      const box = document.getElementById('refreshSummary');
      if (box.classList.contains('show')) return;
      box.textContent = `数据覆盖偏窄：当前股票池缓存 ${data.summary.universe_cache || 0} 支，建议导入同花顺沪深主板列表后再刷新。`;
      box.classList.add('show');
    }

    function renderFreshnessNotice() {
      if (!data.freshness_note || data.freshness_status === '今日数据') return;
      const box = document.getElementById('freshnessBanner');
      box.textContent = `${data.freshness_status}：${data.freshness_note}`;
      box.classList.add('show');
      if (data.freshness_status === '可能过期' || data.freshness_status === '日期异常' || data.freshness_status === '无数据日期') {
        box.classList.add('warn');
      }
    }

    function renderThemeFilters() {
      const box = document.getElementById('themeFilters');
      if (!box) return;
      const themes = data.theme_counts.map(([theme]) => theme);
      box.innerHTML = [
        `<button class="theme-chip active" data-theme="ALL">全部</button>`,
        ...themes.map(theme => `<button class="theme-chip" data-theme="${escapeHtml(theme)}">${escapeHtml(theme)}</button>`)
      ].join('');
      document.querySelectorAll('.theme-chip').forEach(button => {
        button.addEventListener('click', () => {
          state.theme = button.dataset.theme;
          document.querySelectorAll('.theme-chip').forEach(item => item.classList.toggle('active', item === button));
          renderCards();
        });
      });
    }

    function renderThemeBars() {
      const box = document.getElementById('themeBars');
      if (!box) return;
      const max = Math.max(1, ...data.theme_counts.map(([, count]) => count));
      box.innerHTML = data.theme_counts.map(([theme, count]) => `
        <div class="theme-row">
          <span>${escapeHtml(theme)}</span>
          <div class="bar"><span style="width:${Math.round(count / max * 100)}%"></span></div>
          <strong>${count}</strong>
        </div>
      `).join('') || '<div class="empty">暂无主题</div>';
    }

    function renderWorkflowPanel() {
      const box = document.getElementById('workflowPanel');
      if (!box) return;
      const workflow = (data.config || {}).workflow || {};
      const premarket = workflow.premarket_theme_layer || {};
      const intraday = workflow.intraday_validation_layer || {};
      const tail = workflow.tail_execution_layer || {};
      const items = [
        ['1 盘前主题', premarket.pass_rule || premarket.purpose || '先确定主题优先级'],
        ['2 盘中验证', intraday.pass_rule || intraday.purpose || '看板块、量能、分时承接'],
        ['3 尾盘执行', tail.pass_rule || tail.purpose || '只在尾盘窗口按策略执行']
      ];
      box.innerHTML = items.map(([title, text]) => `
        <div class="workflow-step"><strong>${escapeHtml(title)}</strong><span>${escapeHtml(text)}</span></div>
      `).join('');
    }

    function renderNextDayReview() {
      const rows = data.next_day_review || [];
      const box = document.getElementById('nextDayReview');
      if (!rows.length) {
        box.innerHTML = '<div class="review-row"><span>暂无可复盘的上一交易日重点关注记录。系统会先保存今天候选池，下一交易日自动对照。</span></div>';
        return;
      }
      box.innerHTML = rows.slice(0, 5).map(row => {
        const result = row.review_result || '';
        const weak = result.includes('止损') || result.includes('走弱') || result.includes('核对');
        return `
          <div class="review-row ${weak ? 'weak' : ''}">
            <strong>${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}</strong>
            <span>收益 ${escapeHtml(row.return_from_buy_pct ?? '-')}% · 最新 ${escapeHtml(row.next_close || '-')}</span>
            <em>${escapeHtml(result || '-')}</em>
          </div>
        `;
      }).join('');
    }

    function renderPaperTrading() {
      const paper = data.paper_trading || {};
      const perf = paper.performance || {};
      const positions = paper.positions || [];
      const ledger = paper.ledger || [];
      const boxes = [document.getElementById('paperTradingHero')].filter(Boolean);
      if (!Object.keys(perf).length) {
        boxes.forEach(box => {
          box.innerHTML = '<div class="paper-note">模拟账户尚未生成。下次刷新后会从 100 万初始本金开始记录。</div>';
        });
        return;
      }
      const cumulative = numberValue(perf.cumulative_pnl);
      const unrealized = numberValue(perf.unrealized_pnl);
      const realized = numberValue(perf.realized_pnl);
      const metrics = [
        ['当前权益', money(perf.equity)],
        ['现金', money(perf.cash)],
        ['持仓市值', money(perf.market_value)],
        ['累计盈亏', `${cumulative >= 0 ? '+' : ''}${money(cumulative)}`, cumulative >= 0 ? 'profit' : 'loss'],
        ['累计收益', pct(perf.cumulative_return_pct), cumulative >= 0 ? 'profit' : 'loss'],
        ['浮动盈亏', `${unrealized >= 0 ? '+' : ''}${money(unrealized)}`, unrealized >= 0 ? 'profit' : 'loss']
      ];
      const positionHtml = positions.length
        ? positions.slice(0, 5).map(row => {
            const pnl = numberValue(row.unrealized_pnl);
            return `
              <div class="paper-position ${pnl < 0 ? 'weak' : ''}">
                <strong>${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}</strong>
                <span>${escapeHtml(row.shares)} 股 · 买入 ${escapeHtml(row.entry_price)} · 最新 ${escapeHtml(row.current_price)}</span>
                <em>${pnl >= 0 ? '+' : ''}${money(pnl)} / ${pct(row.unrealized_return_pct)}</em>
              </div>
            `;
          }).join('')
        : '<div class="paper-note">当前空仓。未到尾盘窗口或当天没有重点关注时不会建仓。</div>';
      const tradeHtml = ledger.length
        ? ledger.slice(-4).reverse().map(row => {
            const pnl = numberValue(row.pnl_amount);
            return `
              <div class="paper-trade ${pnl < 0 ? 'weak' : ''}">
                <strong>${escapeHtml(row.trade_date)} ${escapeHtml(row.action)} ${escapeHtml(row.stock_code)}</strong>
                <span>${escapeHtml(row.stock_name)} · ${escapeHtml(row.shares)} 股 · ${escapeHtml(row.price)}</span>
                <em>${pnl ? `${pnl >= 0 ? '+' : ''}${money(pnl)} / ${pct(row.pnl_pct)}` : escapeHtml(row.note || '')}</em>
              </div>
            `;
          }).join('')
        : '<div class="paper-note">暂无交易清单。</div>';
      const html = `
        <div class="paper-metrics">
          ${metrics.map(([label, value, tone]) => `<div class="paper-metric ${tone || ''}"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join('')}
        </div>
        <div class="paper-note">初始本金 1,000,000.00；严格遵守 T+1，当日尾盘买入后最早次日卖出；尾盘 ${escapeHtml(perf.note || '按重点关注平均模拟建仓')}。</div>
        ${positionHtml}
        <div class="paper-note">最近交易</div>
        ${tradeHtml}
      `;
      boxes.forEach(box => {
        box.innerHTML = html;
      });
    }

    function renderRuleConfig() {
      const box = document.getElementById('ruleConfig');
      if (!box) return;
      const config = data.config || {};
      const caps = config.pool_caps || {};
      const themes = config.theme_names || [];
      const warnings = config.warnings || [];
      box.innerHTML = `
        <div class="config-line"><span>配置状态</span><strong>${escapeHtml(config.status || '-')}</strong></div>
        <div class="config-line"><span>入池上限</span><strong>A${escapeHtml(caps.A ?? '-')} / B${escapeHtml(caps.B ?? '-')} / C${escapeHtml(caps.C ?? '-')}</strong></div>
        <div class="config-line"><span>规则文件</span><strong>${escapeHtml(config.rules_path || '-')}</strong></div>
        <div class="config-tags">${themes.length ? themes.map(theme => `<span class="tag">${escapeHtml(theme)}</span>`).join('') : '<span class="tag">无</span>'}</div>
        ${warnings.length ? `<div class="config-warning">${warnings.map(escapeHtml).join('<br>')}</div>` : ''}
      `;
    }

    function tagsHtml(value, className = 'tag') {
      const tags = splitTags(value);
      return tags.length ? tags.map(tag => `<span class="${className}">${escapeHtml(tag)}</span>`).join('') : '<span class="tag">无</span>';
    }

    function matches(row) {
      const text = [row.stock_code, row.stock_name, row.theme_tags, row.matched_strategies, row.entry_reasons].join(' ').toLowerCase();
      const themes = splitTags(row.theme_tags);
      const queryOk = !state.query || text.includes(state.query.toLowerCase());
      const poolOk = state.pool === 'ALL' || row.pool_level === state.pool;
      const themeOk = state.theme === 'ALL' || themes.includes(state.theme);
      return queryOk && poolOk && themeOk;
    }

    function setPoolFilter(pool, shouldScroll = true) {
      state.pool = state.pool === pool ? 'ALL' : pool;
      renderMetrics();
      renderCards();
      if (shouldScroll) {
        document.querySelector('.board')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderCards() {
      const rows = data.candidates.filter(matches);
      document.getElementById('resultCount').textContent = `当前显示 ${rows.length} 只，全部候选 ${data.candidates.length} 只`;
      if (!rows.length) {
        const message = data.candidates.length
          ? '当前筛选条件下暂无候选'
          : '底层防御已开启：行情或信号不足，没有合适股票可以不推，当前以空仓等待为主';
        document.getElementById('cards').innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
        return;
      }
      document.getElementById('cards').innerHTML = rows.map(row => {
        const risks = row.risk_tags || '';
        const riskClass = risks.includes('暂无明显风险') ? 'ok' : 'warn';
        return `
          <article class="candidate">
            <div class="candidate-head">
              <div class="pool ${escapeHtml(row.pool_level)}">${escapeHtml(poolLabel[row.pool_level] || row.pool_level)}</div>
              <div>
                <div class="name">${escapeHtml(row.stock_name)}</div>
                <div class="code">${escapeHtml(row.stock_code)} · ${escapeHtml(row.universe)}</div>
              </div>
              <div class="change">${escapeHtml(row.pct_change)}%</div>
            </div>
            <div class="candidate-body">
              <div class="tags">${tagsHtml(row.theme_tags)}${tagsHtml(row.matched_strategies, 'tag strategy')}</div>
              <div class="scoreline">
                <span class="score-pill">评分 ${escapeHtml(row.candidate_score || '-')}</span>
                <span class="score-pill">池内排名 #${escapeHtml(row.pool_rank || '-')}</span>
                <span class="score-pill">原始池 ${escapeHtml(poolLabel[row.pool_raw_level] || row.pool_raw_level || '-')}</span>
              </div>
              ${row.pool_level === 'A' && row.buy_point ? `
                <div class="point-grid" title="${escapeHtml(row.point_basis || '')}">
                  <div class="point"><span>买入点</span><strong>${escapeHtml(row.buy_point)}</strong></div>
                  <div class="point"><span>第一止盈</span><strong>${escapeHtml(row.first_take_profit_point || row.sell_point || '-')}</strong></div>
                  <div class="point follow"><span>强势跟踪</span><strong>${escapeHtml(row.strong_follow_rule || '跌破分时均价线卖出')}</strong></div>
                  <div class="point stop"><span>防守止损</span><strong>${escapeHtml(row.defensive_stop_point || row.stop_point || '-')}</strong></div>
                </div>
              ` : ''}
              <div class="stats">
                <div class="stat"><span>量比</span><strong>${escapeHtml(row.volume_ratio)}</strong></div>
                <div class="stat"><span>换手</span><strong>${escapeHtml(row.turnover_rate)}%</strong></div>
                <div class="stat"><span>收盘位置</span><strong>${escapeHtml(row.close_position_pct)}%</strong></div>
              </div>
              <div class="score-detail"><span class="label">排序依据</span>${escapeHtml(row.score_reasons || '暂无')}</div>
              <div class="reason"><span class="label">入选原因</span>${escapeHtml(row.entry_reasons || '暂无')}</div>
              <div class="risk ${riskClass}"><span class="label">风险标签</span>${escapeHtml(risks || '暂无')}</div>
              <div class="plan">
                <span class="label">次日卖出纪律</span>
                <div class="plan-grid">
                  <div><strong>止盈</strong><br>${escapeHtml(row.next_day_valid_if || '待补充')}</div>
                  <div><strong>时间止损</strong><br>${escapeHtml(row.next_day_weak_if || '待补充')}</div>
                  <div><strong>失效退出</strong><br>${escapeHtml(row.next_day_remove_if || '待补充')}</div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderExcluded() {
      if (!data.excluded.length) {
        document.getElementById('excluded').innerHTML = '';
        return;
      }
      document.getElementById('excluded').innerHTML = `
        <details>
          <summary>已剔除股票 ${data.excluded.length} 只</summary>
          <ul>${data.excluded.map(row => `<li>${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}：${escapeHtml(row.exclude_reason)}</li>`).join('')}</ul>
        </details>
      `;
    }

    function bindControls() {
      document.getElementById('search').addEventListener('input', event => {
        state.query = event.target.value;
        renderCards();
      });
      document.getElementById('refreshData').addEventListener('click', refreshData);
      document.getElementById('metrics').addEventListener('click', event => {
        const noteButton = event.target.closest('.note-corner');
        if (noteButton) {
          event.stopPropagation();
          const metric = noteButton.closest('.metric');
          document.querySelectorAll('.metric.show-note').forEach(item => {
            if (item !== metric) item.classList.remove('show-note');
          });
          metric.classList.toggle('show-note');
          return;
        }
        const metric = event.target.closest('[data-metric-pool]');
        if (!metric) return;
        setPoolFilter(metric.dataset.metricPool);
      });
      document.getElementById('metrics').addEventListener('keydown', event => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const metric = event.target.closest('[data-metric-pool]');
        if (!metric) return;
        event.preventDefault();
        setPoolFilter(metric.dataset.metricPool);
      });
      document.addEventListener('click', () => {
        document.querySelectorAll('.metric.show-note').forEach(item => item.classList.remove('show-note'));
      });
    }

    async function refreshData() {
      const button = document.getElementById('refreshData');
      const label = document.getElementById('refreshState');
      button.disabled = true;
      label.textContent = '刷新中...';
      try {
        const isGithubPages = location.hostname.endsWith('github.io');
        const cloudEndpoint = data.cloud_refresh_endpoint || '';
        if (isGithubPages) {
          if (!cloudEndpoint) {
            label.textContent = '云端刷新待配置';
            alert('固定链接上的刷新需要先配置云端触发接口。自动定时刷新已由 GitHub Actions 接管；按钮直刷需要部署 Cloudflare Worker 后填写接口地址。');
            button.disabled = false;
            return;
          }
          const cloudResponse = await fetch(cloudEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: 'github-pages-button' })
          });
          const cloudResult = await cloudResponse.json();
          if (!cloudResponse.ok || !cloudResult.ok) {
            throw new Error(cloudResult.message || '云端刷新启动失败');
          }
          label.textContent = '云端刷新已启动';
          alert(cloudResult.message || '云端刷新已启动，通常 1-3 分钟后刷新页面查看。');
          button.disabled = false;
          return;
        }
        const response = await fetch('/api/refresh', { method: 'POST' });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || '刷新失败');
        }
        label.textContent = '刷新完成';
        localStorage.setItem('lastRefreshSummary', JSON.stringify(result.summary || {}));
        window.location.href = `/?v=${Date.now()}`;
      } catch (error) {
        label.textContent = error.message || '刷新失败';
        button.disabled = false;
      }
    }

    renderRefreshSummary();
    renderCoverageNotice();
    renderFreshnessNotice();
    renderMetrics();
    renderFunnel();
    // Theme filters, workflow notes, and rule config are intentionally hidden.
    renderNextDayReview();
    renderPaperTrading();
    bindControls();
    renderCards();
    renderExcluded();
  </script>
</body>
</html>
