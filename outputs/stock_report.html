<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A股短线助手看板</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #18202a;
      --muted: #657386;
      --line: #dfe5ec;
      --red: #c93434;
      --blue: #2568a8;
      --teal: #0f766e;
      --green: #16834f;
      --amber: #aa6509;
      --purple: #7357a6;
      --shadow: 0 8px 24px rgba(20, 32, 46, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }
    button, input { font: inherit; }
    .shell { min-height: 100vh; }
    .topbar {
      background: #101820;
      color: #fff;
      border-bottom: 4px solid #c93434;
    }
    .topbar-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 22px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
    }
    .subtitle {
      margin-top: 6px;
      color: #c7d0dc;
      font-size: 14px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }
    .refresh-button {
      height: 40px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      padding: 0 14px;
      color: #fff;
      background: #c93434;
      cursor: pointer;
      font-weight: 700;
    }
    .refresh-button:disabled {
      opacity: .7;
      cursor: wait;
    }
    .refresh-state {
      min-width: 112px;
      color: #c7d0dc;
      font-size: 13px;
      text-align: right;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #48c989;
    }
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px 22px 44px;
    }
    .notice {
      display: none;
    }
    .refresh-summary {
      display: none;
      background: #eef8f5;
      border: 1px solid #b9d8d1;
      color: #174a43;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .refresh-summary.show { display: block; }
    .freshness-banner {
      display: none;
      background: #eef4fb;
      border: 1px solid #bdd0e8;
      color: #183f68;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .freshness-banner.show { display: block; }
    .freshness-banner.warn {
      background: #fff8ec;
      border-color: #e5c486;
      color: #6a4306;
    }
    .risk-alerts {
      display: none;
      margin-bottom: 12px;
      border: 1px solid #efc8c8;
      border-left: 5px solid var(--red);
      border-radius: 8px;
      background: #fff5f5;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .risk-alerts.show {
      display: block;
    }
    .risk-alert {
      padding: 10px 12px;
      border-bottom: 1px solid #f3d6d6;
      color: #6f1d1d;
    }
    .risk-alert:last-child {
      border-bottom: 0;
    }
    .risk-alert strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
    }
    .risk-alert span {
      display: block;
      margin-top: 3px;
      color: #8f2a2a;
      font-size: 12px;
      line-height: 1.35;
    }
    .risk-alert.extra {
      border-left: 5px solid var(--amber);
      background: #fff8ec;
      color: #6a4306;
    }
    .focus-realtime {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 14px;
    }
    .focus-realtime.show {
      display: block;
    }
    .focus-realtime-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .focus-realtime-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .focus-realtime-meta {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
    .sound-toggle {
      height: 32px;
      border: 1px solid #c9d6e4;
      border-radius: 8px;
      background: #f8fafc;
      color: #163e62;
      padding: 0 10px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }
    .sound-toggle.active {
      border-color: var(--teal);
      background: #edf9f6;
      color: var(--teal);
    }
    .focus-price-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    .focus-price-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 9px;
      min-width: 0;
    }
    .focus-price-card.alert {
      border-color: #efc8c8;
      background: #fff7f7;
    }
    .focus-price-card strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .focus-price-card .price {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 800;
      color: var(--ink);
    }
    .focus-price-card .price.up {
      color: var(--red);
    }
    .focus-price-card .price.down {
      color: var(--green);
    }
    .focus-price-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .funnel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .funnel-step {
      position: relative;
      min-height: 64px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .funnel-step::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 5px;
      height: 100%;
      background: var(--blue);
    }
    .funnel-step:nth-child(2)::after { background: var(--teal); }
    .funnel-step:nth-child(3)::after { background: var(--purple); }
    .funnel-step:nth-child(4)::after { background: var(--red); }
    .funnel-step span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .funnel-step strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
      line-height: 1.1;
    }
    .funnel-step small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .metric {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      min-height: 58px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .metric.clickable {
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .metric.clickable:hover {
      transform: translateY(-1px);
      border-color: #b8c7d8;
      box-shadow: 0 10px 26px rgba(20, 32, 46, 0.12);
    }
    .metric.active-filter {
      border-color: #101820;
      box-shadow: inset 0 0 0 2px #101820, var(--shadow);
    }
    .metric span {
      color: var(--muted);
      display: block;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
    }
    .metric strong {
      margin-top: 3px;
      display: block;
      font-size: clamp(18px, 1.25vw, 24px);
      line-height: 1.12;
      overflow-wrap: anywhere;
      word-break: break-word;
      letter-spacing: 0;
    }
    .metric.long strong {
      font-size: clamp(15px, 1vw, 20px);
      line-height: 1.16;
    }
    .metric.small strong {
      font-size: clamp(13px, .9vw, 17px);
      line-height: 1.18;
    }
    .metric.a strong { color: var(--red); }
    .metric.b strong { color: var(--blue); }
    .metric.c strong { color: var(--teal); }
    .note-corner {
      position: absolute;
      top: 0;
      right: 0;
      width: 24px;
      height: 24px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }
    .note-corner::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-top: 18px solid var(--red);
      border-left: 18px solid transparent;
      border-top-right-radius: 7px;
    }
    .note-popup {
      display: none;
      position: absolute;
      z-index: 5;
      top: 28px;
      right: 8px;
      width: min(260px, 75vw);
      padding: 10px;
      border: 1px solid #efc8c8;
      border-radius: 8px;
      background: #fff8f8;
      color: #6f1d1d;
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.45;
    }
    .metric.show-note .note-popup {
      display: block;
    }
    .paper-hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 14px;
    }
    .paper-hero-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .paper-hero-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .paper-hero-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
    .paper-hero .paper-panel {
      margin-top: 0;
    }
    .paper-hero .paper-metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .paper-actions, .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .paper-detail-button, .detail-button {
      height: 34px;
      border: 1px solid #c9d6e4;
      border-radius: 8px;
      background: #f8fafc;
      color: #163e62;
      padding: 0 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .paper-detail-button:hover, .detail-button:hover {
      border-color: var(--blue);
      background: #eef5fc;
    }
    .layout {
      display: block;
    }
    .board {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .board h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .board-tools {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(320px, 1.2fr);
      gap: 12px;
      padding: 14px 14px 0;
      align-items: start;
    }
    .tool-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 10px;
      min-width: 0;
    }
    .tool-panel .label {
      margin-bottom: 7px;
    }
    .control-group {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }
    .segmented button {
      border: 1px solid var(--line);
      background: #f7f8fa;
      border-radius: 8px;
      padding: 8px 0;
      cursor: pointer;
    }
    .segmented button.active {
      background: #101820;
      color: #fff;
      border-color: #101820;
    }
    .search {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
    }
    .theme-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .theme-chip {
      border: 1px solid #cad5e3;
      background: #f6f9fc;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
    }
    .theme-chip.active {
      background: #e8f1fb;
      border-color: var(--blue);
      color: #174b80;
    }
    .board-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 14px 0;
    }
    .board-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .candidate {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .candidate-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .pool {
      width: 88px;
      height: 40px;
      border-radius: 8px;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      background: var(--red);
    }
    .pool.B { background: var(--blue); }
    .pool.C { background: var(--teal); }
    .name {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
    }
    .code {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }
    .change {
      font-size: 22px;
      font-weight: 800;
      color: var(--red);
      white-space: nowrap;
    }
    .candidate-body {
      padding: 12px;
    }
    .live-price-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border: 1px solid #f0c9c9;
      border-radius: 8px;
      background: #fff8f8;
      padding: 8px 10px;
      margin-bottom: 10px;
      color: #8f2a2a;
      font-size: 12px;
      font-weight: 800;
    }
    .live-price-line strong {
      color: var(--red);
      font-size: 18px;
      line-height: 1.1;
    }
    .live-price-line strong.down {
      color: var(--green);
    }
    .scoreline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .score-pill {
      border: 1px solid var(--line);
      background: #fbfbfc;
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .point-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 10px;
    }
    .point {
      border: 1px solid #f0c9c9;
      background: #fff8f8;
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 0;
    }
    .point span {
      display: block;
      color: #8f2a2a;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }
    .point strong {
      display: block;
      margin-top: 3px;
      color: var(--red);
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .point.stop {
      border-color: #d8dde5;
      background: #f8fafc;
    }
    .point.stop span {
      color: var(--muted);
    }
    .point.stop strong {
      color: var(--ink);
    }
    .point.follow {
      border-color: #cfe2de;
      background: #f2fbf8;
    }
    .point.follow span {
      color: var(--teal);
    }
    .point.follow strong {
      color: var(--teal);
      font-size: 13px;
      line-height: 1.25;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tag {
      border: 1px solid #cdd8e5;
      background: #f3f7fb;
      color: #244762;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
    }
    .tag.strategy {
      background: #fff1f1;
      color: #9e2525;
      border-color: #efc8c8;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .stat {
      padding: 8px;
      border-right: 1px solid var(--line);
      background: #fafbfc;
    }
    .stat:last-child { border-right: 0; }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 15px;
    }
    .reason, .risk, .score-detail, .plan {
      border-left: 4px solid var(--blue);
      background: #f7fbff;
      border-radius: 6px;
      padding: 9px 10px;
      margin-top: 8px;
    }
    .workflow {
      border-left: 4px solid var(--teal);
      background: #f2fbf8;
      border-radius: 6px;
      padding: 9px 10px;
      margin-top: 8px;
    }
    .workflow-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 6px;
    }
    .workflow-grid div {
      border: 1px solid #cfe2de;
      border-radius: 8px;
      background: #fbfffd;
      padding: 7px;
      font-size: 12px;
      min-width: 0;
    }
    .workflow-grid strong {
      display: block;
      color: var(--ink);
      font-size: 12px;
      margin-bottom: 2px;
    }
    .workflow-grid p {
      margin: 0;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .risk.ok {
      border-left-color: var(--green);
      background: #f2fbf6;
    }
    .risk.warn {
      border-left-color: var(--amber);
      background: #fff8ec;
    }
    .score-detail {
      border-left-color: var(--purple);
      background: #f7f4fb;
    }
    .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .plan-grid div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fbfbfc;
      font-size: 13px;
    }
    .themes-panel {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }
    .theme-row {
      display: grid;
      grid-template-columns: 70px 1fr 24px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }
    .config-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
    }
    .workflow-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .review-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .review-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 8px;
      font-size: 12px;
    }
    .review-row strong {
      display: block;
      font-size: 13px;
      color: var(--ink);
    }
    .review-row span {
      color: var(--muted);
    }
    .review-row em {
      display: block;
      margin-top: 3px;
      color: var(--teal);
      font-style: normal;
      font-weight: 700;
      line-height: 1.35;
    }
    .review-row.weak em {
      color: var(--amber);
    }
    .paper-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
    }
    .paper-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .paper-metric, .paper-position, .paper-trade {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafbfc;
      padding: 8px;
      min-width: 0;
    }
    .paper-metric span, .paper-position span, .paper-trade span {
      display: block;
      color: var(--muted);

  <script>
    const data = JSON.parse(document.getElementById('dashboard-data').textContent);
    data.candidates.forEach((row, index) => row.__idx = index);
    const state = { pool: 'ALL', theme: 'ALL', query: '' };
    const liveState = {
      quotes: {},
      lastUpdated: '',
      soundEnabled: false,
      alerted: new Set(),
      timer: null
    };

    const poolLabel = { A: '重点关注', B: '观察候补', C: '题材异动记录' };
    const poolNotes = {
      A: '重点关注：命中攻击型尾盘突破或主线热点回流等较强信号，并且严重风险较少，是次日优先观察对象。',
      B: '观察候补：主题或形态有机会，但强度、确认度、风险控制不如重点关注，需要等待次日确认。',
      C: '题材异动记录：命中重点主题，但暂时没有明确策略信号或强度不足，主要用于记录和后续观察。'
    };
    const metricItems = [
      { label: '交易日', value: data.trade_date || '-' },
      { label: '重点关注', value: data.summary.a_pool, tone: 'a', pool: 'A' },
      { label: '观察候补', value: data.summary.b_pool, tone: 'b', pool: 'B' },
      { label: '题材异动记录', value: data.summary.c_pool, tone: 'c', pool: 'C' },
      { label: '股票池缓存', value: data.summary.universe_cache },
      { label: '覆盖状态', value: data.summary.coverage_status },
      { label: '已剔除', value: data.summary.excluded }
    ];

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function splitTags(value) {
      return String(value || '').replace(/；/g, ';').split(';').map(x => x.trim()).filter(Boolean);
    }

    function numberValue(value) {
      const n = Number(String(value ?? '').replace(/,/g, ''));
      return Number.isFinite(n) ? n : 0;
    }

    function money(value) {
      return numberValue(value).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function pct(value) {
      return `${numberValue(value).toFixed(2)}%`;
    }

    function focusRows() {
      return data.candidates.filter(row => row.pool_level === 'A');
    }

    function displayPrice(row) {
      const quote = liveState.quotes[row.stock_code] || {};
      return numberValue(quote.price || row.close || row.buy_point);
    }

    function priceTone(row) {
      const price = displayPrice(row);
      const base = numberValue(row.buy_point || row.close);
      if (!price || !base) return '';
      if (price > base) return 'up';
      if (price < base) return 'down';
      return '';
    }

    function quoteEndpoint() {
      const endpoint = String(data.cloud_refresh_endpoint || '').trim();
      if (!endpoint) return '';
      return `${endpoint.replace(/\/$/, '')}/quotes`;
    }

    function strongUpsideCandidate(row, price) {
      const take = numberValue(row.first_take_profit_point || row.sell_point);
      if (!take || price < take) return false;
      const score = numberValue(row.candidate_score);
      const themeLimitUps = numberValue(row.real_theme_limit_up_count || row.theme_limit_up_count);
      const closePosition = numberValue(row.close_position_pct);
      const volumeRatio = numberValue(row.volume_ratio);
      const cleanRisk = !hasMeaningfulRisk(row.risk_tags);
      return score >= 120 && themeLimitUps >= 3 && closePosition >= 97 && volumeRatio >= 1.2 && cleanRisk;
    }

    function realtimeAlerts() {
      const alerts = [];
      focusRows().forEach(row => {
        const price = displayPrice(row);
        const take = numberValue(row.first_take_profit_point || row.sell_point);
        const stop = numberValue(row.defensive_stop_point || row.stop_point);
        if (!price) return;
        if (take && price >= take) {
          alerts.push({
            type: 'take',
            code: row.stock_code,
            name: row.stock_name,
            title: `${row.stock_code} ${row.stock_name} 到达第一止盈`,
            detail: `实时价 ${price.toFixed(2)} ≥ 止盈 ${take.toFixed(2)}。按纪律可先落袋一部分。`,
          });
          if (strongUpsideCandidate(row, price)) {
            alerts.push({
              type: 'extra',
              code: row.stock_code,
              name: row.stock_name,
              title: `${row.stock_code} ${row.stock_name} 止盈已到但强度仍高`,
              detail: '主题强度、评分、收盘位置和量能仍满足强势跟踪条件，可考虑保留小仓按分时均价线跟踪。',
            });
          }
        }
        if (stop && price <= stop) {
          alerts.push({
            type: 'stop',
            code: row.stock_code,
            name: row.stock_name,
            title: `${row.stock_code} ${row.stock_name} 触发防守止损`,
            detail: `实时价 ${price.toFixed(2)} ≤ 止损 ${stop.toFixed(2)}。短线纪律优先，避免短线变长线。`,
          });
        }
      });
      return alerts;
    }

    function playAlertSound() {
      if (!liveState.soundEnabled) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const context = new AudioContextClass();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = 880;
        gain.gain.setValueAtTime(0.001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.35);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.36);
      } catch (error) {}
    }

    function renderRiskAlerts() {
      const box = document.getElementById('riskAlerts');
      const alerts = realtimeAlerts();
      if (!alerts.length) {
        box.classList.remove('show');
        box.innerHTML = '';
        return;
      }
      box.classList.add('show');
      box.innerHTML = alerts.map(alert => `
        <div class="risk-alert ${alert.type === 'extra' ? 'extra' : ''}">
          <strong>${escapeHtml(alert.title)}</strong>
          <span>${escapeHtml(alert.detail)}</span>
        </div>
      `).join('');
      alerts.forEach(alert => {
        const key = `${alert.type}:${alert.code}`;
        if (liveState.alerted.has(key)) return;
        liveState.alerted.add(key);
        playAlertSound();
      });
    }

    function renderFocusRealtime() {
      const rows = focusRows();
      const box = document.getElementById('focusRealtime');
      if (!rows.length) {
        box.classList.remove('show');
        box.innerHTML = '';
        return;
      }
      const endpointReady = Boolean(quoteEndpoint());
      box.classList.add('show');
      const cards = rows.map(row => {
        const price = displayPrice(row);
        const take = numberValue(row.first_take_profit_point || row.sell_point);
        const stop = numberValue(row.defensive_stop_point || row.stop_point);
        const quote = liveState.quotes[row.stock_code] || {};
        const triggered = (take && price >= take) || (stop && price <= stop);
        const tone = priceTone(row);
        return `
          <div class="focus-price-card ${triggered ? 'alert' : ''}">
            <strong>${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}</strong>
            <em class="price ${tone}">${price ? price.toFixed(2) : '-'}</em>
            <span>止盈 ${take ? take.toFixed(2) : '-'} · 止损 ${stop ? stop.toFixed(2) : '-'}</span>
            <span>${quote.pct_change !== undefined ? `涨跌 ${pct(quote.pct_change)} · ` : ''}${quote.time ? escapeHtml(quote.time) : '等待实时刷新'}</span>
          </div>
        `;
      }).join('');
      box.innerHTML = `
        <div class="focus-realtime-head">
          <h2>重点关注实时风控</h2>
          <div class="focus-realtime-meta">
            <button class="sound-toggle ${liveState.soundEnabled ? 'active' : ''}" type="button" id="soundToggle">${liveState.soundEnabled ? '声音已开' : '开启声音'}</button>
            <span>${endpointReady ? `每 15 秒刷新 · ${liveState.lastUpdated || '准备中'}` : '实时刷新待 Worker 更新'}</span>
          </div>
        </div>
        <div class="focus-price-grid">${cards}</div>
      `;
    }

    function updateCardLivePrices() {
      document.querySelectorAll('[data-card-live-price]').forEach(item => {
        const code = item.dataset.cardLivePrice;
        const row = data.candidates.find(candidate => candidate.stock_code === code);
        if (!row) return;
        const price = displayPrice(row);
        item.textContent = price ? price.toFixed(2) : '-';
        item.classList.toggle('down', priceTone(row) === 'down');
      });
    }

    async function fetchFocusQuotes() {
      const endpoint = quoteEndpoint();
      const rows = focusRows();
      if (!endpoint || !rows.length) {
        renderFocusRealtime();
        renderRiskAlerts();
        updateCardLivePrices();
        return;
      }
      try {
        const codes = rows.map(row => row.stock_code).join(',');
        const response = await fetch(`${endpoint}?codes=${encodeURIComponent(codes)}`, { method: 'GET' });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.message || '实时行情获取失败');
        liveState.quotes = result.quotes || {};
        liveState.lastUpdated = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      } catch (error) {
        liveState.lastUpdated = '实时刷新失败';
      }
      renderFocusRealtime();
      renderRiskAlerts();
      updateCardLivePrices();
    }

    function startRealtimeQuotes() {
      renderFocusRealtime();
      renderRiskAlerts();
      updateCardLivePrices();
      fetchFocusQuotes();
      if (liveState.timer) clearInterval(liveState.timer);
      liveState.timer = setInterval(fetchFocusQuotes, 15000);
    }

    function renderMetrics() {
      const sourceDetail = (data.source_counts || []).map(([name, count]) => `${name} ${count}`).join('，');
      document.getElementById('subtitle').textContent = `生成时间：${data.generated_at} · 来源：${sourceDetail || data.primary_source || '-'}`;
      document.getElementById('marketState').textContent = `市场状态：${data.market_state}`;
      document.getElementById('metrics').innerHTML = metricItems.map(item => `
        <div class="metric ${item.tone || ''} ${item.pool ? 'clickable' : ''} ${item.pool && state.pool === item.pool ? 'active-filter' : ''} ${String(item.value ?? '').length >= 6 ? 'long' : ''} ${String(item.value ?? '').length >= 10 ? 'small' : ''}" ${item.pool ? `data-metric-pool="${item.pool}" role="button" tabindex="0" aria-label="查看${escapeHtml(item.label)}列表"` : ''}>
          ${item.pool ? `<button class="note-corner" type="button" data-note-pool="${item.pool}" aria-label="${escapeHtml(item.label)}说明"></button><div class="note-popup">${escapeHtml(poolNotes[item.pool])}</div>` : ''}
          <span>${escapeHtml(item.label)}</span>

      `).join('');

    function percent(part, total) {
      const base = Number(total || 0);
      if (!base) return '-';
      return `${(Number(part || 0) / base * 100).toFixed(1)}%`;
    }

    function renderFunnel() {
      const total = data.summary.total_rows || 0;
      const eligible = data.summary.eligible || 0;
      const rawHits = data.summary.raw_candidate_count || 0;
      const finalCount = data.summary.candidate_count || 0;
      const steps = [
        { label: '原始采集', value: total, note: `行情接口拿到` },
        { label: '有效主板', value: eligible, note: `剔除 ST、创业板等` },
        { label: '规则命中', value: rawHits, note: `主题/形态/量价命中` },
        { label: '最终展示', value: finalCount, note: `收敛到三类池` }
      ];
      document.getElementById('screeningFunnel').innerHTML = steps.map((step, index) => {
        const denominator = index === 0 ? total : steps[index - 1].value;
        return `
          <div class="funnel-step">
            <span>${escapeHtml(step.label)}</span>
            <strong>${escapeHtml(step.value)}</strong>
            <small>${escapeHtml(step.note)} · 保留 ${escapeHtml(index === 0 ? '100%' : percent(step.value, denominator))}</small>
          </div>

      const raw = localStorage.getItem('lastRefreshSummary');
      if (!raw) return;
      localStorage.removeItem('lastRefreshSummary');
      try {
        const summary = JSON.parse(raw);
        const parts = [
          `来源：${summary.source || '-'}`,
          `交易日：${summary.trade_date || '-'}`,
          `采集：${summary.rows || 0}`,
          `规则命中：${summary.raw_candidate_count || 0}`,
          `入池：${summary.candidate_rows || 0}`,
          `股票池：${summary.universe_cache || 0}`,
          `复盘：${summary.review_rows || 0}`
        ];
        if (summary.fallback) parts.push('已启用降级兜底');
        const box = document.getElementById('refreshSummary');
        box.textContent = `刷新完成 · ${parts.join(' · ')}`;
        box.classList.add('show');
      } catch (error) {
        localStorage.removeItem('lastRefreshSummary');

      return Boolean(text) && !text.includes('暂无明显风险');

    function openCandidateDetail(index, section) {
      const row = data.candidates[Number(index)];

      const stock = `${row.stock_code} ${row.stock_name}`;
      if (section === 'score') {
        openDetailPage(`${stock} · 排序依据`, detailCard('排序依据', safeText(row.score_reasons)));

      }
      if (section === 'reason') {
        openDetailPage(`${stock} · 入选原因`, detailCard('入选原因', safeText(row.entry_reasons)));

      if (section === 'risk') {
        openDetailPage(`${stock} · 风险标签`, detailCard('风险标签', safeText(row.risk_tags)));
        return;
      }
      if (section === 'sell') {
        openDetailPage(`${stock} · 次日卖出纪律`, `
          ${detailCard('止盈', safeText(row.next_day_valid_if || '待补充'))}
          ${detailCard('时间止损', safeText(row.next_day_weak_if || '待补充'))}
          ${detailCard('失效退出', safeText(row.next_day_remove_if || '待补充'))}
        `);
      }
    }

      const paper = data.paper_trading || {};
      const perf = paper.performance || {};
      const positions = paper.positions || [];
      const ledger = paper.ledger || [];
      const positionRows = positions.length
        ? positions.map(row => {
            const pnl = numberValue(row.unrealized_pnl);

                <div>
                  <strong>${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}</strong>

                <em>${pnl >= 0 ? '+' : ''}${money(pnl)} / ${pct(row.unrealized_return_pct)}</em>
              </div>
            `;
          }).join('')
        : '<div class="paper-note">当前空仓。未到尾盘窗口或当天没有重点关注时不会建仓。</div>';
      const ledgerRows = ledger.length
        ? ledger.slice().reverse().map(row => {

            const latestPrice = row.latest_price || row.price || '-';
            const resultText = row.action === 'BUY'
              ? `${latestPnl >= 0 ? '+' : ''}${money(latestPnl)} / ${pct(row.latest_pnl_pct)}`

            return `
              <div class="detail-row ${latestPnl < 0 ? 'weak' : ''}">
                <div>
                  <strong>${escapeHtml(row.trade_date)} ${escapeHtml(row.action)} ${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}</strong>

      openDetailPage('模拟盘详情', `
        <div class="detail-card">
          <h3>账户核心</h3>
          <p>当前权益：${money(perf.equity)}
现金：${money(perf.cash)}
持仓市值：${money(perf.market_value)}
累计盈亏：${numberValue(perf.cumulative_pnl) >= 0 ? '+' : ''}${money(perf.cumulative_pnl)} / ${pct(perf.cumulative_return_pct)}
更新时间：${escapeHtml(perf.last_updated || data.generated_at || '-')}</p>

    function tagsHtml(value, className = 'tag') {
      const tags = splitTags(value);
      return tags.length ? tags.map(tag => `<span class="${className}">${escapeHtml(tag)}</span>`).join('') : '<span class="tag">无</span>';
    }

    function matches(row) {
      const text = [row.stock_code, row.stock_name, row.theme_tags, row.matched_strategies, row.entry_reasons].join(' ').toLowerCase();
      const themes = splitTags(row.theme_tags);
      const queryOk = !state.query || text.includes(state.query.toLowerCase());
      const poolOk = state.pool === 'ALL' || row.pool_level === state.pool;
      const themeOk = state.theme === 'ALL' || themes.includes(state.theme);
      return queryOk && poolOk && themeOk;
    }

    function setPoolFilter(pool, shouldScroll = true) {
      state.pool = state.pool === pool ? 'ALL' : pool;

      renderCards();
      if (shouldScroll) {
        document.querySelector('.board')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

        <details>
          <summary>已剔除股票 ${data.excluded.length} 只</summary>
          <ul>${data.excluded.map(row => `<li>${escapeHtml(row.stock_code)} ${escapeHtml(row.stock_name)}：${escapeHtml(row.exclude_reason)}</li>`).join('')}</ul>

    function bindControls() {
      document.getElementById('search').addEventListener('input', event => {
        state.query = event.target.value;
        renderCards();
      });
      document.getElementById('refreshData').addEventListener('click', refreshData);
      document.getElementById('detailBack').addEventListener('click', closeDetailPage);
      document.getElementById('focusRealtime').addEventListener('click', event => {
        const button = event.target.closest('#soundToggle');
        if (!button) return;
        liveState.soundEnabled = !liveState.soundEnabled;
        renderFocusRealtime();
      });
      document.getElementById('detailPage').addEventListener('click', event => {
        if (event.target.id === 'detailPage') closeDetailPage();
      });
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeDetailPage();
      });
      document.getElementById('paperTradingHero').addEventListener('click', event => {
        const button = event.target.closest('[data-paper-detail]');
        if (!button) return;
        openPaperDetail();
      });
      document.getElementById('cards').addEventListener('click', event => {
        const button = event.target.closest('[data-candidate-detail]');
        if (!button) return;
        openCandidateDetail(button.dataset.candidateDetail, button.dataset.section);
      });
      document.getElementById('metrics').addEventListener('click', event => {
        const noteButton = event.target.closest('.note-corner');
        if (noteButton) {
          event.stopPropagation();
          const metric = noteButton.closest('.metric');
          document.querySelectorAll('.metric.show-note').forEach(item => {
            if (item !== metric) item.classList.remove('show-note');
          });
          metric.classList.toggle('show-note');
          return;
        }
        const metric = event.target.closest('[data-metric-pool]');
        if (!metric) return;
        setPoolFilter(metric.dataset.metricPool);
      });
      document.getElementById('metrics').addEventListener('keydown', event => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const metric = event.target.closest('[data-metric-pool]');
        if (!metric) return;
        event.preventDefault();
        setPoolFilter(metric.dataset.metricPool);
      });
      document.addEventListener('click', () => {
        document.querySelectorAll('.metric.show-note').forEach(item => item.classList.remove('show-note'));
      });
    }

    async function refreshData() {
      const button = document.getElementById('refreshData');
      const label = document.getElementById('refreshState');
      button.disabled = true;
      label.textContent = '刷新中...';
      try {
        const isGithubPages = location.hostname.endsWith('github.io');
        const cloudEndpoint = data.cloud_refresh_endpoint || '';
        if (isGithubPages) {
          if (!cloudEndpoint) {
            label.textContent = '云端刷新待配置';
            alert('固定链接上的刷新需要先配置云端触发接口。自动定时刷新已由 GitHub Actions 接管；按钮直刷需要部署 Cloudflare Worker 后填写接口地址。');
            button.disabled = false;
            return;
          }
          const cloudResponse = await fetch(cloudEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: 'github-pages-button' })
          });
          const cloudResult = await cloudResponse.json();
          if (!cloudResponse.ok || !cloudResult.ok) {
            throw new Error(cloudResult.message || '云端刷新启动失败');
          }
          label.textContent = '云端刷新已启动';
          alert(cloudResult.message || '云端刷新已启动，通常 1-3 分钟后刷新页面查看。');
          button.disabled = false;
          return;
        }
        const response = await fetch('/api/refresh', { method: 'POST' });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || '刷新失败');
        }
        label.textContent = '刷新完成';
        localStorage.setItem('lastRefreshSummary', JSON.stringify(result.summary || {}));
        window.location.href = `/?v=${Date.now()}`;
      } catch (error) {
        label.textContent = error.message || '刷新失败';
        button.disabled = false;
      }
    }

    renderRefreshSummary();
    renderCoverageNotice();
    renderFreshnessNotice();
    renderMetrics();
    renderFunnel();
    // Theme filters, workflow notes, and rule config are intentionally hidden.
    renderNextDayReview();
    renderPaperTrading();
    bindControls();
    renderCards();
    renderExcluded();
    startRealtimeQuotes();
  </script>
</body>
</html>
