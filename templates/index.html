<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股热点短线助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0a0e1a; color: #d0d5e0; min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #0f1929 0%, #1a2744 100%);
  border-bottom: 1px solid #1e3050;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(90deg, #f0b840, #f5923e);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle { font-size: 13px; color: #718096; margin-left: 8px; -webkit-text-fill-color: #718096; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #8899b0; }
.header-right .refresh-btn {
  background: #1e3050; border: 1px solid #2a4070; color: #b0c0d8;
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
.header-right .refresh-btn:hover { background: #2a4070; color: #fff; }
.header-right .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
}
.status-dot.online { background: #48bb78; }
.status-dot.loading { background: #ecc94b; animation: pulse 1s infinite; }
.status-dot.offline { background: #f56565; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.container { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
@media (max-width: 1024px) { .container { grid-template-columns: 1fr; } }

.card { background: #111827; border: 1px solid #1e3050; border-radius: 10px; padding: 18px; margin-bottom: 18px; }
.card-title {
  font-size: 15px; font-weight: 600; color: #c8d0e0;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.card-title .badge { font-size: 11px; font-weight: 400; background: #1e3050; color: #8899b0; padding: 2px 8px; border-radius: 10px; }

.market-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.market-item { text-align: center; padding: 12px 8px; background: #0f1929; border-radius: 8px; border: 1px solid #1a2840; }
.market-item .label { font-size: 12px; color: #718096; margin-bottom: 4px; }
.market-item .value { font-size: 22px; font-weight: 700; }
.market-item .value.rise { color: #f56565; }
.market-item .value.fall { color: #48bb78; }
.market-item .value.neutral { color: #ecc94b; }
.market-item .value.info { color: #63b3ed; }

.concept-list { display: flex; flex-direction: column; gap: 4px; }
.concept-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px; border-radius: 6px; font-size: 13px;
  transition: background 0.15s;
}
.concept-row:hover { background: #1a2840; }
.concept-row .name { color: #c8d0e0; }
.concept-row .change { font-weight: 600; }
.concept-row .change.rise { color: #f56565; }
.concept-row .change.fall { color: #48bb78; }
.concept-row .index { color: #4a5a70; width: 20px; text-align: right; }

.signal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.signal-table th {
  text-align: left; padding: 8px 10px; color: #718096; font-weight: 500;
  border-bottom: 1px solid #1e3050; white-space: nowrap;
}
.signal-table td { padding: 10px; border-bottom: 1px solid #152238; vertical-align: middle; }
.signal-table tr:hover td { background: #0f1929; }

.tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; white-space: nowrap; }
.tag-buy { background: #1a3a2a; color: #48bb78; border: 1px solid #2a5a3a; }
.tag-watch { background: #1a2a40; color: #63b3ed; border: 1px solid #2a4070; }
.tag-light { background: #2a2810; color: #ecc94b; border: 1px solid #3a3820; }
.tag-avoid { background: #2a1010; color: #f56565; border: 1px solid #4a2020; }

.score-bar { display: inline-block; height: 6px; border-radius: 3px; width: 60px; background: #1a2840; overflow: hidden; vertical-align: middle; }
.score-bar .fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.score-bar .fill.high { background: linear-gradient(90deg, #48bb78, #38a169); }
.score-bar .fill.mid { background: linear-gradient(90deg, #ecc94b, #d69e2e); }
.score-bar .fill.low { background: linear-gradient(90deg, #f56565, #e53e3e); }
.score-text { font-size: 12px; color: #8899b0; margin-left: 6px; }

.action-buy { color: #48bb78; }
.action-watch { color: #63b3ed; }
.action-light { color: #ecc94b; }
.action-avoid { color: #f56565; }

.reasons { font-size: 12px; color: #718096; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.change-pct { font-weight: 600; }
.change-pct.rise { color: #f56565; }
.change-pct.fall { color: #48bb78; }

.news-list { display: flex; flex-direction: column; gap: 8px; }
.news-item { padding: 8px 10px; border-radius: 6px; background: #0a0e1a; font-size: 13px; line-height: 1.5; border-left: 3px solid #1e3050; }
.news-item .news-time { font-size: 11px; color: #4a5a70; margin-bottom: 2px; }

.loading-spinner { text-align: center; padding: 40px; color: #4a5a70; }
.loading-spinner::before {
  content: ''; display: inline-block; width: 24px; height: 24px;
  border: 3px solid #1e3050; border-top-color: #63b3ed;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-msg { text-align: center; padding: 30px; color: #4a5a70; font-size: 14px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0e1a; }
::-webkit-scrollbar-thumb { background: #1e3050; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2a4070; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1> A股短线助手 <span class="subtitle">热点追踪 · 信号推送</span></h1>
  </div>
  <div class="header-right">
    <span id="status-indicator">
      <span class="status-dot online" id="status-dot"></span>
      <span id="status-text">数据就绪</span>
    </span>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()"> 刷新数据</button>
    <span id="update-time">--:--:--</span>
  </div>
</div>

<div class="container">
  <div class="main-col">
    <div class="card" id="market-card">
      <div class="card-title"> 大盘情绪</div>
      <div class="market-grid" id="market-grid">
        <div class="market-item"><div class="label">上涨</div><div class="value neutral" id="rise-count">--</div></div>
        <div class="market-item"><div class="label">下跌</div><div class="value neutral" id="fall-count">--</div></div>
        <div class="market-item"><div class="label">涨停</div><div class="value info" id="limit-up">--</div></div>
        <div class="market-item"><div class="label">跌停</div><div class="value info" id="limit-down">--</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"> 今日操作建议 <span class="badge" id="signal-count">加载中...</span></div>
      <div id="signals-container"><div class="loading-spinner"></div></div>
    </div>
  </div>

  <div class="side-col">
    <div class="card">
      <div class="card-title"> 热门板块</div>
      <div id="concepts-container"><div class="loading-spinner"></div></div>
    </div>
    <div class="card">
      <div class="card-title"> 实时快讯</div>
      <div id="news-container"><div class="loading-spinner"></div></div>
    </div>
  </div>
</div>

<script>
async function fetchAPI(url) {
  try {
    const resp = await fetch(url);
    return await resp.json();
  } catch (e) {
    console.error('API error:', url, e);
    return null;
  }
}

async function loadOverview() {
  const data = await fetchAPI('/api/overview');
  if (!data || !data.success) return;
  const d = data.data;
  document.getElementById('rise-count').textContent = d.rise_count ?? '--';
  document.getElementById('rise-count').className = 'value rise';
  document.getElementById('fall-count').textContent = d.fall_count ?? '--';
  document.getElementById('fall-count').className = 'value fall';
  document.getElementById('limit-up').textContent = d.limit_up ?? '--';
  document.getElementById('limit-up').className = 'value info';
  document.getElementById('limit-down').textContent = d.limit_down ?? '--';
  document.getElementById('limit-down').className = 'value info';
}

async function loadConcepts() {
  const data = await fetchAPI('/api/hot_concepts');
  const container = document.getElementById('concepts-container');
  if (!data || !data.success) {
    container.innerHTML = '<div class="empty-msg">暂无数据</div>'; return;
  }
  if (!data.data || data.data.length === 0) {
    container.innerHTML = '<div class="empty-msg">暂无数据（非交易时段）</div>'; return;
  }
  const html = '<div class="concept-list">' + data.data.map((c, i) => {
    const pct = c.change_pct || 0;
    const cls = pct >= 0 ? 'rise' : 'fall';
    return '<div class="concept-row">'
      + '<span class="index">' + (i+1) + '</span>'
      + '<span class="name">' + (c.name || '--') + '</span>'
      + '<span class="change ' + cls + '">' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%</span>'
      + '</div>';
  }).join('') + '</div>';
  container.innerHTML = html;
}

function actionTag(action) {
  if (!action) return '<span class="tag tag-light">等待</span>';
  if (action.includes('买入') || action.includes('涨停+热点')) return '<span class="tag tag-buy"> 买入窗口</span>';
  if (action.includes('涨停')) return '<span class="tag tag-buy"> 涨停</span>';
  if (action.includes('观察')) return '<span class="tag tag-watch"> 列入观察</span>';
  if (action.includes('关注')) return '<span class="tag tag-light"> 轻度关注</span>';
  if (action.includes('回避')) return '<span class="tag tag-avoid"> 回避</span>';
  if (action.includes('不参与')) return '<span class="tag tag-avoid"> 暂不参与</span>';
  return '<span class="tag tag-light">' + action + '</span>';
}

function scoreFill(score) {
  if (score >= 60) return 'high';
  if (score >= 40) return 'mid';
  return 'low';
}

async function loadSignals() {
  const data = await fetchAPI('/api/signals');
  const container = document.getElementById('signals-container');
  const countBadge = document.getElementById('signal-count');

  if (!data || !data.success) {
    container.innerHTML = '<div class="empty-msg"> 数据加载失败</div>';
    countBadge.textContent = '错误'; return;
  }

  const signals = data.data || [];
  if (!signals || signals.length === 0) {
    container.innerHTML = '<div class="empty-msg"><p>当前无信号<br><span style="font-size:12px;color:#4a5a70;">可能是非交易时段或暂无符合条件的个股</span></p></div>';
    countBadge.textContent = '0'; return;
  }

  countBadge.textContent = signals.length + ' 条';

  let html = '<table class="signal-table"><thead><tr>'
    + '<th>代码</th><th>名称</th><th>现价</th><th>涨幅</th><th>综合评分</th><th>操作建议</th><th>理由</th>'
    + '</tr></thead><tbody>';

  for (const s of signals) {
    const score = s.total_score || 0;
    const chg = s.change_pct || 0;
    const chgCls = chg >= 0 ? 'rise' : 'fall';
    const tagHtml = actionTag(s.action);
    html += '<tr>'
      + '<td style="color:#8899b0;">' + s.code + '</td>'
      + '<td><strong>' + s.name + '</strong></td>'
      + '<td>' + (s.price || 0).toFixed(2) + '</td>'
      + '<td><span class="change-pct ' + chgCls + '">' + (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%</span></td>'
      + '<td><span class="score-bar"><span class="fill ' + scoreFill(score) + '" style="width:' + score + '%"></span></span>'
      + '<span class="score-text">' + score + '</span></td>'
      + '<td>' + tagHtml + '</td>'
      + '<td><span class="reasons" title="' + (s.reasons || '').replace(/"/g,'&quot;') + '">' + (s.reasons || '--') + '</span></td>'
      + '</tr>';
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function loadNews() {
  const data = await fetchAPI('/api/news');
  const container = document.getElementById('news-container');
  if (!data || !data.success || !data.data || data.data.length === 0) {
    container.innerHTML = '<div class="empty-msg">暂无快讯</div>'; return;
  }
  const html = '<div class="news-list">' + data.data.map(n => {
    const title = n.title || n.content || '';
    const time = n.time || '';
    return '<div class="news-item">'
      + (time ? '<div class="news-time">' + time + '</div>' : '')
      + '<div>' + title + '</div></div>';
  }).join('') + '</div>';
  container.innerHTML = html;
}

let isLoading = false;
async function refreshAll() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  btn.disabled = true;
  dot.className = 'status-dot loading';
  text.textContent = '加载中...';

  await Promise.all([loadOverview(), loadConcepts(), loadSignals(), loadNews()]);

  const now = new Date();
  document.getElementById('update-time').textContent =
    now.toLocaleTimeString('zh-CN', { hour12: false });
  dot.className = 'status-dot online';
  text.textContent = '数据就绪';
  btn.disabled = false;
  isLoading = false;
}

document.addEventListener('DOMContentLoaded', function() {
  refreshAll();
  setInterval(refreshAll, 60000);
});
</script>
</body>
</html>
